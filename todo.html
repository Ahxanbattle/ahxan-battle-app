<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List - Ahxan Battle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0A0A0A 0%, #1a1a2e 100%);
            color: #FFFFFF;
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(26, 26, 46, 0.8);
            border-radius: 15px;
            padding: 2rem;
            border: 2px solid rgba(0, 123, 255, 0.3);
            box-shadow: 0 0 30px rgba(0, 123, 255, 0.2);
        }

        h1 {
            text-align: center;
            color: #007BFF;
            margin-bottom: 2rem;
            text-shadow: 0 0 10px rgba(0, 123, 255, 0.6);
            font-size: 2.5rem;
        }

        .input-section {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        input[type="text"] {
            flex: 1;
            padding: 1rem;
            border: 2px solid rgba(0, 123, 255, 0.3);
            background: rgba(10, 10, 10, 0.5);
            color: #FFFFFF;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #007BFF;
            box-shadow: 0 0 10px rgba(0, 123, 255, 0.5);
        }

        input[type="text"]::placeholder {
            color: #666666;
        }

        .add-btn {
            padding: 1rem 2rem;
            background: linear-gradient(135deg, #007BFF 0%, #0056cc 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(0, 123, 255, 0.3);
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(0, 123, 255, 0.6);
        }

        .add-btn:active {
            transform: translateY(0);
        }

        .todos-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1.2rem;
            background: rgba(0, 123, 255, 0.05);
            border: 1px solid rgba(0, 123, 255, 0.2);
            border-radius: 8px;
            transition: all 0.3s;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .todo-item:hover {
            background: rgba(0, 123, 255, 0.1);
            border-color: rgba(0, 123, 255, 0.4);
            box-shadow: 0 0 15px rgba(0, 123, 255, 0.2);
        }

        .todo-item.completed {
            opacity: 0.6;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: #666666;
        }

        input[type="checkbox"] {
            width: 24px;
            height: 24px;
            cursor: pointer;
            accent-color: #007BFF;
        }

        .todo-text {
            flex: 1;
            font-size: 1.05rem;
            word-break: break-word;
            transition: all 0.3s;
        }

        .delete-btn {
            background: rgba(255, 0, 0, 0.2);
            color: #ff6b6b;
            border: 1px solid #ff6b6b;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .delete-btn:hover {
            background: rgba(255, 0, 0, 0.4);
            box-shadow: 0 0 10px rgba(255, 107, 107, 0.4);
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: #666666;
            font-size: 1.1rem;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 2rem;
            padding: 1rem;
            background: rgba(0, 123, 255, 0.05);
            border-radius: 8px;
            border: 1px solid rgba(0, 123, 255, 0.2);
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            color: #007BFF;
            font-weight: bold;
        }

        .stat-label {
            color: #b0b0b0;
            font-size: 0.9rem;
            margin-top: 0.3rem;
        }

        .clear-all-btn {
            width: 100%;
            padding: 0.8rem;
            margin-top: 1rem;
            background: rgba(255, 0, 0, 0.1);
            color: #ff6b6b;
            border: 1px solid rgba(255, 0, 0, 0.3);
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .clear-all-btn:hover {
            background: rgba(255, 0, 0, 0.2);
            box-shadow: 0 0 10px rgba(255, 107, 107, 0.3);
        }

        @media (max-width: 600px) {
            .container {
                padding: 1.5rem;
            }

            h1 {
                font-size: 2rem;
            }

            .input-section {
                flex-direction: column;
            }

            .add-btn {
                width: 100%;
            }

            .stats {
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚔️ TODO LIST</h1>

        <div class="input-section">
            <input 
                type="text" 
                id="todoInput" 
                placeholder="Add a new task..." 
                autocomplete="off"
            >
            <button class="add-btn" onclick="addTodo()">ADD</button>
        </div>

        <div class="todos-list" id="todosList"></div>

        <div class="empty-state" id="emptyState">
            No tasks yet. Add one to get started! 🎮
        </div>

        <div class="stats" id="stats" style="display: none;">
            <div class="stat-item">
                <div class="stat-number" id="totalCount">0</div>
                <div class="stat-label">Total Tasks</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="completedCount">0</div>
                <div class="stat-label">Completed</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="pendingCount">0</div>
                <div class="stat-label">Pending</div>
            </div>
        </div>

        <button class="clear-all-btn" id="clearAllBtn" onclick="clearAllTodos()" style="display: none;">
            Clear All Completed Tasks
        </button>
    </div>

    <script>
        // Initialize todos from localStorage
        function initTodos() {
            loadTodos();
        }

        // Add a new todo
        function addTodo() {
            const input = document.getElementById('todoInput');
            const text = input.value.trim();

            if (text === '') {
                alert('Please enter a task!');
                return;
            }

            const todos = getTodos();
            const newTodo = {
                id: Date.now(),
                text: text,
                completed: false
            };

            todos.push(newTodo);
            saveTodos(todos);
            input.value = '';
            loadTodos();
        }

        // Load todos from localStorage
        function loadTodos() {
            const todos = getTodos();
            const todosList = document.getElementById('todosList');
            const emptyState = document.getElementById('emptyState');
            const stats = document.getElementById('stats');
            const clearAllBtn = document.getElementById('clearAllBtn');

            todosList.innerHTML = '';

            if (todos.length === 0) {
                emptyState.style.display = 'block';
                stats.style.display = 'none';
                clearAllBtn.style.display = 'none';
                return;
            }

            emptyState.style.display = 'none';
            stats.style.display = 'flex';

            todos.forEach(todo => {
                const todoItem = document.createElement('div');
                todoItem.className = `todo-item ${todo.completed ? 'completed' : ''}`;
                todoItem.innerHTML = `
                    <input 
                        type="checkbox" 
                        ${todo.completed ? 'checked' : ''} 
                        onchange="toggleTodo(${todo.id})"
                    >
                    <span class="todo-text">${escapeHtml(todo.text)}</span>
                    <button class="delete-btn" onclick="deleteTodo(${todo.id})">Delete</button>
                `;
                todosList.appendChild(todoItem);
            });

            updateStats();

            const hasCompleted = todos.some(t => t.completed);
            clearAllBtn.style.display = hasCompleted ? 'block' : 'none';
        }

        // Get todos from localStorage
        function getTodos() {
            const todos = localStorage.getItem('todos');
            return todos ? JSON.parse(todos) : [];
        }

        // Save todos to localStorage
        function saveTodos(todos) {
            localStorage.setItem('todos', JSON.stringify(todos));
        }

        // Toggle todo completion status
        function toggleTodo(id) {
            const todos = getTodos();
            const todo = todos.find(t => t.id === id);
            if (todo) {
                todo.completed = !todo.completed;
                saveTodos(todos);
                loadTodos();
            }
        }

        // Delete a todo
        function deleteTodo(id) {
            const todos = getTodos();
            const filtered = todos.filter(t => t.id !== id);
            saveTodos(filtered);
            loadTodos();
        }

        // Clear all completed todos
        function clearAllTodos() {
            const todos = getTodos();
            const filtered = todos.filter(t => !t.completed);
            saveTodos(filtered);
            loadTodos();
        }

        // Update statistics
        function updateStats() {
            const todos = getTodos();
            const completed = todos.filter(t => t.completed).length;
            const pending = todos.length - completed;

            document.getElementById('totalCount').textContent = todos.length;
            document.getElementById('completedCount').textContent = completed;
            document.getElementById('pendingCount').textContent = pending;
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Allow Enter key to add todo
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('todoInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    addTodo();
                }
            });
            initTodos();
        });
    </script>
</body>
</html>
